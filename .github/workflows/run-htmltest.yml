name: Run htmltest over rendered content
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]
  workflow_dispatch:

jobs:
  htmltest:
    runs-on: ubuntu-latest
    env:
      HUGO_CACHE_CONTAINER_DIR: /src/.hugo_cache
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Hugo site in Docker Compose
        run: |
          docker compose build --pull hugo
          docker compose run --rm --no-deps \
            --entrypoint sh \
            --user "$(id -u):$(id -g)" \
            -e HUGO_CACHEDIR="${HUGO_CACHE_CONTAINER_DIR}" \
            -e OUTPUT_DIR=/src/dist \
            hugo -c '.github/scripts/build-site.sh'

      - name: run htmltest
        continue-on-error: true
        uses: wjdp/htmltest-action@master
        with:
          config: .htmltest.yml

      - name: archive htmltest results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: htmltest-report
          path: tmp/.htmltest/
          retention-days: 5
